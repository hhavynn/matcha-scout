apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb-local
  namespace: matcha-scout-local
  labels:
    app.kubernetes.io/name: dynamodb-local
    app.kubernetes.io/part-of: matcha-scout
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dynamodb-local
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dynamodb-local
        app.kubernetes.io/part-of: matcha-scout
    spec:
      containers:
        - name: dynamodb-local
          image: amazon/dynamodb-local:latest
          args:
            - -jar
            - DynamoDBLocal.jar
            - -sharedDb
            - -inMemory
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
