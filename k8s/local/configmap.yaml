apiVersion: v1
kind: ConfigMap
metadata:
  name: matcha-scout-config
  namespace: matcha-scout-local
  labels:
    app.kubernetes.io/name: matcha-scout
data:
  AWS_REGION: us-west-2
  DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
  DYNAMODB_TABLE_NAME: matcha_scout
  AI_PROVIDER: gemini
  USE_MOCK_AI: "true"
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
  NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
  SERVER_API_BASE_URL: http://matcha-scout-api:8000
