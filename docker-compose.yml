services:
  postgres:
    image: postgres:17-alpine
    container_name: matcha-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: matcha_scout
      POSTGRES_USER: matcha
      POSTGRES_PASSWORD: matcha
    volumes:
      - matcha-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matcha -d matcha_scout"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matcha-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://matcha:matcha@postgres:5432/matcha_scout
      DATABASE_ENVIRONMENT: local
    volumes:
      - ./backend/app:/app/app       # Hot-reload: local app code changes reflect immediately
      - ./backend/tests:/app/tests   # Hot-reload: test changes reflect immediately
      - ./data:/app/data:ro          # Curation JSON files (read-only inside container)
      - ./data/backups:/app/data/backups # Verified sync backups/reports (gitignored, writable)
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  matcha-postgres-data:
