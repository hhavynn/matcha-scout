services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: matcha-dynamodb
    ports:
      - "8001:8000"   # Host 8001 → Container 8000 (avoids clash with API on host)
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matcha-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app   # Hot-reload: local code changes reflect immediately
    depends_on:
      dynamodb-local:
        condition: service_healthy
    restart: unless-stopped
